name: Deploy to GitHub Pages

# Builds the Vite app and publishes it to GitHub Pages.
# In the repository settings, set Pages → Build and deployment → Source to
# "GitHub Actions" so this workflow can deploy.
on:
  push:
    branches:
      - main
      - claude/alice-english-music-learning-D48pU
  workflow_dispatch:

# Permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # The Spotify Client ID is public (PKCE flow has no secret), so a
          # repository *variable* named SPOTIFY_CLIENT_ID is the cleanest place
          # for it. If unset, the value baked into src/config.ts is used.
          VITE_SPOTIFY_CLIENT_ID: ${{ vars.SPOTIFY_CLIENT_ID || secrets.SPOTIFY_CLIENT_ID }}
          # Optional cloud sync (Supabase). Set these as repository Variables
          # (recommended) OR Secrets — either works thanks to the fallback.
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          # Unique per commit — lets the running app detect new deploys and
          # prompt/refresh automatically (see src/hooks/useAppUpdate.ts).
          VITE_APP_VERSION: ${{ github.sha }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
