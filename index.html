    <link

    <!-- Spotify Web Playback SDK. The no-op default keeps the SDK happy when
         we don't initialise a player (e.g. free accounts); the player
         controller overrides this callback when it does init. -->
    <script>
      window.onSpotifyWebPlaybackSDKReady = window.onSpotifyWebPlaybackSDKReady || function () {}
    </script>
